services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/scorio_polymarket
    command: ["node", "dist/scanner.js", "--loop"]

volumes:
  mongo_data:
